apiVersion: apps/v1
kind: Deployment
metadata:
  name: profile-product
spec:
  replicas: 2
  selector:
    matchLabels:
      app: profile-product
  template:
    metadata:
      labels:
        app: profile-product
    spec:
      containers:
        - name: profile-product
          image: 192.168.1.12:8082/profile-product:latest
          ports:
            - containerPort: 3000
